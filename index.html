<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Vegan Meal Planner</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Papa Parse for reading the CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Preserves the line breaks from your CSV text */
        .preserve-lines {
            white-space: pre-wrap;
        }
        /* Search dropdown */
        .search-wrapper {
            position: relative;
        }
        .search-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 50;
            background: #fff;
            border: 1px solid #d1fae5;
            border-radius: 0.75rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
            overflow: hidden;
            max-height: 280px;
            overflow-y: auto;
        }
        .search-dropdown.hidden { display: none; }
        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0fdf4;
            transition: background 0.12s;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover, .search-result-item:focus {
            background: #f0fdf4;
            outline: none;
        }
        .search-result-title {
            font-weight: 600;
            font-size: 0.875rem;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-match {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-match em {
            color: #059669;
            font-style: normal;
            font-weight: 600;
        }
        .search-no-results {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body class="bg-green-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-green-600 text-white py-8 shadow-md">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight">🌱 7-Day Vegan Meal Planner</h1>
            <p class="mt-2 text-green-100 text-lg">Your personalized, randomized weekly menu.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10 max-w-5xl flex-grow">
        
        <!-- Controls -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-green-100 text-center flex flex-col items-center justify-center gap-4">
            
            <div id="loadingState" class="flex items-center text-green-600 font-medium">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Loading recipe database...
            </div>

            <button id="generateBtn" class="hidden bg-green-600 hover:bg-green-700 text-white text-lg font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 duration-300">
                🎲 Generate My Weekly Meal Plan
            </button>
            <p id="recipeCount" class="text-sm text-gray-500 hidden mt-2"></p>
        </div>

        <!-- Meal Plan Grid -->
        <div id="mealPlanContainer" class="mt-10 grid grid-cols-1 gap-8 hidden">
            <!-- Days will be injected here by JavaScript -->
        </div>

        <!-- Shopping List CTA -->
        <div id="shoppingListCta" class="hidden mt-6 text-center">
            <button onclick="buildShoppingList()" class="bg-emerald-700 hover:bg-emerald-800 active:scale-95 text-white text-lg font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 duration-300">
                🛒 Create Shopping List
            </button>
        </div>

        <!-- Shopping List Output -->
        <div id="shoppingListSection" class="hidden mt-10 bg-white rounded-2xl shadow-md border border-green-100 p-8">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-2xl font-extrabold text-gray-800">🛒 Weekly Shopping List</h2>
                <button id="copyBtn" onclick="copyShoppingList()" class="flex items-center gap-2 bg-green-100 hover:bg-green-200 active:scale-95 text-green-800 font-semibold text-sm px-4 py-2 rounded-full transition-all duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    Copy to clipboard
                </button>
            </div>
            <p class="text-sm text-gray-500 mb-4">Ingredients grouped by day — copy and paste into any notes app.</p>
            <textarea id="shoppingListOutput"
                class="w-full h-96 font-mono text-sm text-gray-800 bg-gray-50 border border-gray-200 rounded-xl p-4 resize-y focus:outline-none focus:ring-2 focus:ring-green-400"
                readonly
                spellcheck="false"
            ></textarea>
        </div>

    </main>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const mealPlanContainer = document.getElementById('mealPlanContainer');
        const loadingState = document.getElementById('loadingState');
        const recipeCountText = document.getElementById('recipeCount');

        let recipesData = [];
        // Tracks the current 7-day plan so per-day swaps know which recipes are already in use
        let currentPlan = [];

        const weekdays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // Load CSV on page load
        window.addEventListener('DOMContentLoaded', () => {
            Papa.parse("vegan_recipes.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    recipesData = results.data.filter(row => row.title && row.title.trim() !== "");
                    if (recipesData.length >= 7) {
                        loadingState.classList.add('hidden');
                        generateBtn.classList.remove('hidden');
                        recipeCountText.textContent = `Successfully loaded ${recipesData.length} recipes.`;
                        recipeCountText.classList.remove('hidden');
                    } else {
                        loadingState.innerHTML = `<span class="text-red-500">Error: CSV file not found or doesn't have enough recipes.</span>`;
                    }
                },
                error: function(error) {
                    loadingState.innerHTML = `<span class="text-red-500">Error loading database. Ensure 'vegan_recipes.csv' is in the same folder.</span>`;
                    console.error(error);
                }
            });
        });

        // Fisher-Yates shuffle helper
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // Generate a fresh 7-day plan
        generateBtn.addEventListener('click', () => {
            currentPlan = shuffle(recipesData).slice(0, 7);
            renderMealPlan(currentPlan);
        });

        // Swap only one day's recipe, avoiding duplicates already in the plan
        function randomizeDay(dayIndex) {
            const usedTitles = new Set(currentPlan.map(r => r.title));
            // Remove today's current recipe from the exclusion set so it can be re-picked if pool is tiny
            usedTitles.delete(currentPlan[dayIndex].title);

            const pool = recipesData.filter(r => !usedTitles.has(r.title));
            if (pool.length === 0) return; // Shouldn't happen with a large CSV

            const newRecipe = pool[Math.floor(Math.random() * pool.length)];
            currentPlan[dayIndex] = newRecipe;

            // Animate the card out, swap content, animate back in
            const card = document.getElementById(`day-card-${dayIndex}`);
            card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-8px)';

            setTimeout(() => {
                renderDayCard(dayIndex, newRecipe, card);
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 250);
        }

        // Build the inner HTML for a single day card
        function buildCardInner(dayIndex, recipe) {
            const day = weekdays[dayIndex];
            const cleanIngredients = recipe.ingredients ? recipe.ingredients.replace(/^"|"$/g, '').trim() : "No ingredients listed.";
            const cleanPrep = recipe.preparation ? recipe.preparation.replace(/^"|"$/g, '').trim() : "No preparation listed.";
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            const dayTextClass = isWeekend ? 'text-yellow-600' : 'text-green-600';

            return `
                <div class="p-6 w-full">
                    <div class="flex items-center justify-between mb-1">
                        <div class="uppercase tracking-wider text-sm ${dayTextClass} font-extrabold">${day}</div>
                        <button
                            onclick="randomizeDay(${dayIndex})"
                            title="Randomize ${day}"
                            class="flex items-center gap-1.5 text-xs font-semibold text-white bg-green-500 hover:bg-green-600 active:scale-95 px-3 py-1.5 rounded-full shadow transition-all duration-150"
                        >
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            New suggestion
                        </button>
                    </div>

                    <!-- Per-day recipe search -->
                    <div class="search-wrapper mt-3 mb-4">
                        <div class="relative">
                            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
                            </span>
                            <input
                                id="search-input-${dayIndex}"
                                type="text"
                                placeholder="Search recipes or ingredients…"
                                autocomplete="off"
                                oninput="handleDaySearch(${dayIndex})"
                                onfocus="handleDaySearch(${dayIndex})"
                                class="w-full pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white transition"
                            />
                        </div>
                        <div id="search-dropdown-${dayIndex}" class="search-dropdown hidden"></div>
                    </div>

                    <a href="${recipe.href}" target="_blank" class="block mt-1 text-2xl leading-tight font-bold text-gray-900 hover:text-green-600 transition-colors duration-200">
                        ${recipe.title}
                    </a>
                    <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-green-50/50 p-5 rounded-xl border border-green-100">
                            <h3 class="font-bold text-green-800 text-lg mb-3 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                Ingredients
                            </h3>
                            <div class="preserve-lines text-sm text-gray-700 leading-relaxed">${cleanIngredients}</div>
                        </div>
                        <div class="bg-blue-50/50 p-5 rounded-xl border border-blue-100">
                            <h3 class="font-bold text-blue-800 text-lg mb-3 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Preparation
                            </h3>
                            <div class="preserve-lines text-sm text-gray-700 leading-relaxed">${cleanPrep}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Update an existing card's inner content in-place
        function renderDayCard(dayIndex, recipe, cardEl) {
            cardEl.innerHTML = buildCardInner(dayIndex, recipe);
        }

        // ── Per-day search ───────────────────────────────────────────────────

        // Highlight the matched substring inside a string
        function highlightMatch(text, query) {
            if (!query) return text;
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return text;
            return text.slice(0, idx)
                + '<em>' + text.slice(idx, idx + query.length) + '</em>'
                + text.slice(idx + query.length);
        }

        function handleDaySearch(dayIndex) {
            const input  = document.getElementById(`search-input-${dayIndex}`);
            const drop   = document.getElementById(`search-dropdown-${dayIndex}`);
            const query  = input.value.trim();

            if (query.length === 0) {
                drop.classList.add('hidden');
                drop.innerHTML = '';
                return;
            }

            const lower = query.toLowerCase();
            const results = recipesData
                .filter(r => {
                    const inTitle = r.title && r.title.toLowerCase().includes(lower);
                    const inIngr  = r.ingredients && r.ingredients.toLowerCase().includes(lower);
                    return inTitle || inIngr;
                })
                .slice(0, 8);

            if (results.length === 0) {
                drop.innerHTML = `<div class="search-no-results">No recipes found for "${query}"</div>`;
                drop.classList.remove('hidden');
                return;
            }

            drop.innerHTML = results.map((r, i) => {
                const inIngr = !r.title.toLowerCase().includes(lower) && r.ingredients && r.ingredients.toLowerCase().includes(lower);
                // Build a short ingredient context snippet when the match came from ingredients
                let matchSnippet = '';
                if (inIngr) {
                    const ingredLower = r.ingredients.toLowerCase();
                    const matchIdx   = ingredLower.indexOf(lower);
                    const start      = Math.max(0, matchIdx - 20);
                    const end        = Math.min(r.ingredients.length, matchIdx + lower.length + 30);
                    const snippet    = (start > 0 ? '…' : '') + r.ingredients.slice(start, end).trim() + (end < r.ingredients.length ? '…' : '');
                    matchSnippet     = `<div class="search-result-match">Ingredient: ${highlightMatch(snippet, query)}</div>`;
                }
                return `
                    <div
                        class="search-result-item"
                        tabindex="0"
                        onmousedown="selectSearchResult(event, ${dayIndex}, ${recipesData.indexOf(r)})"
                        onkeydown="if(event.key==='Enter'||event.key===' ') selectSearchResult(event, ${dayIndex}, ${recipesData.indexOf(r)})"
                    >
                        <div class="search-result-title">${highlightMatch(r.title, query)}</div>
                        ${matchSnippet}
                    </div>`;
            }).join('');

            drop.classList.remove('hidden');
        }

        function selectSearchResult(event, dayIndex, recipeIdx) {
            event.preventDefault();
            const newRecipe = recipesData[recipeIdx];
            currentPlan[dayIndex] = newRecipe;

            // Clear the search input and close dropdown
            const input = document.getElementById(`search-input-${dayIndex}`);
            const drop  = document.getElementById(`search-dropdown-${dayIndex}`);
            if (input) input.value = '';
            if (drop)  { drop.innerHTML = ''; drop.classList.add('hidden'); }

            // Animate card swap
            const card = document.getElementById(`day-card-${dayIndex}`);
            card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-8px)';
            setTimeout(() => {
                renderDayCard(dayIndex, newRecipe, card);
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 250);
        }

        // Close any open dropdown when clicking outside a search wrapper
        document.addEventListener('click', (e) => {
            document.querySelectorAll('.search-dropdown').forEach(drop => {
                if (!drop.closest('.search-wrapper').contains(e.target)) {
                    drop.classList.add('hidden');
                }
            });
        });

        // Render the full 7-day plan from scratch
        function renderMealPlan(recipes) {
            mealPlanContainer.innerHTML = '';
            mealPlanContainer.classList.remove('hidden');

            recipes.forEach((recipe, index) => {
                const day = weekdays[index];
                const isWeekend = (day === 'Saturday' || day === 'Sunday');
                const borderClass = isWeekend ? 'border-yellow-400' : 'border-green-500';

                const wrapper = document.createElement('div');
                wrapper.id = `day-card-${index}`;
                wrapper.className = `bg-white rounded-2xl shadow-md overflow-hidden border-l-8 ${borderClass} flex flex-col md:flex-row transform transition duration-300 hover:shadow-lg`;
                wrapper.innerHTML = buildCardInner(index, recipe);
                mealPlanContainer.appendChild(wrapper);
            });

            mealPlanContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Show the shopping list CTA and reset the list section
            document.getElementById('shoppingListCta').classList.remove('hidden');
            document.getElementById('shoppingListSection').classList.add('hidden');
            document.getElementById('shoppingListOutput').value = '';
        }

        // Build the markdown shopping list from currentPlan
        function buildShoppingList() {
            if (currentPlan.length === 0) return;

            const lines = [];
            lines.push('# 🛒 Weekly Shopping List\n');

            currentPlan.forEach((recipe, index) => {
                const day = weekdays[index];
                lines.push(`## ${day}: ${recipe.title}\n`);

                const rawIngredients = recipe.ingredients
                    ? recipe.ingredients.replace(/^"|"$/g, '').trim()
                    : '';

                if (rawIngredients) {
                    // Split on newlines, filter blank lines, output as tickbox items
                    const items = rawIngredients
                        .split('\n')
                        .map(l => l.trim())
                        .filter(l => l.length > 0);

                    items.forEach(item => lines.push(`- [ ] ${item}`));
                } else {
                    lines.push('- [ ] (no ingredients listed)');
                }

                lines.push(''); // blank line between days
            });

            const markdown = lines.join('\n');
            const output = document.getElementById('shoppingListOutput');
            output.value = markdown;

            const section = document.getElementById('shoppingListSection');
            section.classList.remove('hidden');
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Copy the shopping list textarea to clipboard
        async function copyShoppingList() {
            const output = document.getElementById('shoppingListOutput');
            const btn = document.getElementById('copyBtn');
            try {
                await navigator.clipboard.writeText(output.value);
                btn.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Copied!
                `;
                btn.classList.add('bg-green-300');
                setTimeout(() => {
                    btn.innerHTML = `
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        Copy to clipboard
                    `;
                    btn.classList.remove('bg-green-300');
                }, 2000);
            } catch {
                // Fallback for older browsers
                output.select();
                document.execCommand('copy');
            }
        }
    </script>
</body>
</html>
